<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 80" width="260" height="80">
  <defs>
    <!-- Shield gradient -->
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#FF653D"/>
      <stop offset="100%" stop-color="#962D11"/>
    </linearGradient>
    <!-- Gold accent -->
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <!-- Glow filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Text shadow -->
    <filter id="textShadow" x="-5%" y="-5%" width="110%" height="120%">
      <feDropShadow dx="0" dy="1" stdDeviation="1" flood-color="#FF653D" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- ── SHIELD ─────────────────────────────────── -->
  <g transform="translate(4, 4)">
    <!-- Outer shield glow -->
    <path d="M36 2 L62 14 L62 44 Q62 62 36 72 Q10 62 10 44 L10 14 Z"
          fill="none" stroke="rgba(255,101,61,0.3)" stroke-width="3"
          filter="url(#glow)"/>

    <!-- Main shield body -->
    <path d="M36 4 L60 15 L60 44 Q60 60 36 70 Q12 60 12 44 L12 15 Z"
          fill="url(#shieldGrad)"/>

    <!-- Shield inner border -->
    <path d="M36 8 L56 18 L56 44 Q56 57 36 66 Q16 57 16 44 L16 18 Z"
          fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>

    <!-- Shield inner dark area -->
    <path d="M36 10 L54 20 L54 44 Q54 55 36 64 Q18 55 18 44 L18 20 Z"
          fill="rgba(0,0,0,0.25)"/>

    <!-- Book icon inside shield -->
    <g transform="translate(24, 28)">
      <!-- Left page -->
      <rect x="0" y="0" width="10" height="14" rx="1.5"
            fill="white" opacity="0.92"/>
      <!-- Right page -->
      <rect x="12" y="0" width="10" height="14" rx="1.5"
            fill="white" opacity="0.92"/>
      <!-- Spine -->
      <rect x="10" y="0" width="2" height="14" rx="0.5"
            fill="url(#goldGrad)"/>
      <!-- Left page lines -->
      <line x1="2" y1="4"  x2="8"  y2="4"  stroke="#FF653D" stroke-width="1" opacity="0.5"/>
      <line x1="2" y1="7"  x2="8"  y2="7"  stroke="#FF653D" stroke-width="1" opacity="0.5"/>
      <line x1="2" y1="10" x2="8"  y2="10" stroke="#FF653D" stroke-width="1" opacity="0.5"/>
      <!-- Right page lines -->
      <line x1="14" y1="4"  x2="20" y2="4"  stroke="#FF653D" stroke-width="1" opacity="0.5"/>
      <line x1="14" y1="7"  x2="20" y2="7"  stroke="#FF653D" stroke-width="1" opacity="0.5"/>
      <line x1="14" y1="10" x2="20" y2="10" stroke="#FF653D" stroke-width="1" opacity="0.5"/>
    </g>

    <!-- Torch flame at top of shield -->
    <g transform="translate(31, 10)">
      <path d="M5 12 Q2 8 3 4 Q4 1 5 0 Q6 3 7 4 Q9 8 6 12 Z"
            fill="#fbbf24" opacity="0.9"/>
      <path d="M5 12 Q3.5 9 4 6 Q5 3 5 1.5 Q5.5 4 6 6 Q7 9 5.5 12 Z"
            fill="white" opacity="0.7"/>
      <rect x="3.5" y="12" width="3" height="5" rx="1" fill="url(#goldGrad)"/>
    </g>

    <!-- Gold stars at bottom of shield -->
    <g transform="translate(27, 56)" fill="url(#goldGrad)">
      <circle cx="3"  cy="3" r="1.8"/>
      <circle cx="9"  cy="3" r="1.8"/>
      <circle cx="15" cy="3" r="1.8"/>
      <circle cx="21" cy="3" r="1.8"/>
    </g>

    <!-- Gold top border line -->
    <line x1="12" y1="22" x2="60" y2="22"
          stroke="url(#goldGrad)" stroke-width="0.75" opacity="0.6"/>
  </g>

  <!-- ── TEXT SECTION ──────────────────────────── -->
  <g transform="translate(78, 0)">

    <!-- VVIT large text -->
    <text x="0" y="38"
          font-family="'Rajdhani', 'Arial Black', sans-serif"
          font-size="34"
          font-weight="700"
          fill="#f0f0f5"
          letter-spacing="3"
          filter="url(#textShadow)">VVIT</text>

    <!-- Red underline accent -->
    <rect x="0" y="41" width="88" height="2.5" rx="1.25"
          fill="url(#goldGrad)" opacity="0.9"/>

    <!-- Full college name line 1 -->
    <text x="0" y="56"
          font-family="'Inter', Arial, sans-serif"
          font-size="9.5"
          font-weight="500"
          fill="#d1d5db"
          letter-spacing="0.3">Vasireddy Venkatadri</text>

    <!-- Full college name line 2 -->
    <text x="0" y="68"
          font-family="'Inter', Arial, sans-serif"
          font-size="9.5"
          font-weight="500"
          fill="#d1d5db"
          letter-spacing="0.3">Institute of Technology</text>

    <!-- Location tag -->
    <text x="0" y="79"
          font-family="'Inter', Arial, sans-serif"
          font-size="7.5"
          fill="#FF653D"
          letter-spacing="0.5"
          opacity="0.85">&#9679; Nambur, Guntur, Andhra Pradesh</text>
  </g>
</svg>
