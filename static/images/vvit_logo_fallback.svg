<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <!-- Outer shield background -->
  <path d="M60 8 L100 28 L100 72 Q100 98 60 112 Q20 98 20 72 L20 28 Z"
        fill="url(#shieldGrad)" stroke="#dc2626" stroke-width="1.5"/>

  <!-- Inner shield highlight -->
  <path d="M60 18 L92 34 L92 70 Q92 90 60 102 Q28 90 28 70 L28 34 Z"
        fill="url(#innerGrad)" opacity="0.4"/>

  <!-- Book / education symbol - open book -->
  <g transform="translate(35, 44)">
    <rect x="0" y="6" width="20" height="14" rx="2" fill="white" opacity="0.9"/>
    <rect x="22" y="6" width="20" height="14" rx="2" fill="white" opacity="0.9"/>
    <line x1="21" y1="6" x2="21" y2="20" stroke="#dc2626" stroke-width="1.5"/>
    <line x1="10" y1="9" x2="10" y2="17" stroke="#dc2626" stroke-width="1" opacity="0.6"/>
    <line x1="6" y1="11" x2="14" y2="11" stroke="#dc2626" stroke-width="1" opacity="0.6"/>
    <line x1="32" y1="9" x2="32" y2="17" stroke="#dc2626" stroke-width="1" opacity="0.6"/>
    <line x1="28" y1="11" x2="36" y2="11" stroke="#dc2626" stroke-width="1" opacity="0.6"/>
  </g>

  <!-- Torch / flame of knowledge -->
  <g transform="translate(53, 26)">
    <path d="M7 20 Q3 14 5 8 Q7 4 7 2 Q9 6 11 8 Q13 14 9 20 Z"
          fill="#ef4444" opacity="0.9"/>
    <path d="M7 20 Q5 16 6 12 Q7 8 7 6 Q8 9 9 11 Q11 15 9 20 Z"
          fill="#fbbf24" opacity="0.85"/>
    <rect x="5" y="20" width="4" height="8" rx="1" fill="#dc2626"/>
  </g>

  <!-- Stars row across bottom of shield -->
  <g fill="#fbbf24" opacity="0.85" transform="translate(38, 82)">
    <polygon points="5,1 6.2,4.2 9.5,4.2 7,6.2 7.9,9.5 5,7.5 2.1,9.5 3,6.2 0.5,4.2 3.8,4.2" transform="scale(0.5)"/>
    <polygon points="5,1 6.2,4.2 9.5,4.2 7,6.2 7.9,9.5 5,7.5 2.1,9.5 3,6.2 0.5,4.2 3.8,4.2" transform="translate(16,0) scale(0.5)"/>
    <polygon points="5,1 6.2,4.2 9.5,4.2 7,6.2 7.9,9.5 5,7.5 2.1,9.5 3,6.2 0.5,4.2 3.8,4.2" transform="translate(32,0) scale(0.5)"/>
  </g>

  <!-- VVIT text at top -->
  <text x="60" y="37" font-family="'Rajdhani', sans-serif" font-size="9"
        font-weight="700" fill="white" text-anchor="middle" letter-spacing="2" opacity="0.9">VVIT</text>

  <!-- Gradients -->
  <defs>
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#1a0505"/>
      <stop offset="100%" stop-color="#0d0202"/>
    </linearGradient>
    <linearGradient id="innerGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#dc2626"/>
      <stop offset="100%" stop-color="transparent"/>
    </linearGradient>
  </defs>
</svg>
