# ═══════════════════════════════════════════════════════
# VVITU Portal — Render.com Deployment Configuration
# Deploy at: https://render.com
# Push this repo to GitHub, then connect it on Render.
# Render reads this file and sets everything up automatically.
# ═══════════════════════════════════════════════════════

services:
  # ── Web Service (Django + Gunicorn) ─────────────────
  - type: web
    name: vvitu-portal
    runtime: python
    region: singapore   # closest to Andhra Pradesh
    plan: free          # upgrade to "starter" for always-on

    # Build: install dependencies and collect static files
    buildCommand: |
      pip install -r requirements.txt &&
      python manage.py collectstatic --no-input

    # Start: run migrations, load sample data, and launch Gunicorn
    startCommand: |
      python manage.py migrate &&
      python manage.py seed_data &&
      gunicorn VVITU_Portal.wsgi:application --bind 0.0.0.0:$PORT --workers 4 --timeout 120


    # Health check so Render knows when the app is ready
    healthCheckPath: /accounts/login/

    # Environment variables Render will set for you
    # Add SECRET_KEY and DATABASE_URL in the Render dashboard.
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: VVITU_Portal.settings_prod   # production settings file

      - key: SECRET_KEY
        generateValue: true   # Render auto-generates a secure random key

      - key: PYTHON_VERSION
        value: 3.11.0

      - key: WEB_CONCURRENCY
        value: 4

      - key: DATABASE_URL
        fromDatabase:
          name: vvitu-portal-db
          property: connectionString

databases:
  # ── PostgreSQL Database ──────────────────────────────
  - name: vvitu-portal-db
    plan: free
    region: singapore
    databaseName: vvitu_portal
    user: vvitu_user

