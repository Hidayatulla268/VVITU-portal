{% extends "core/base.html" %}
{% load static %}
{% load core_tags %}
{% block title %}Add Student{% endblock %}
{% block page_header %}
<div class="page-header-strip">
  <div class="ph-left">
    <h1 class="ph-title"><i class="fas fa-user-plus me-2 text-accent"></i>Add New Student</h1>
    <p class="ph-sub">Create a new student account in the VVIT Portal</p>
  </div>
</div>
{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-xl-8">
    <div class="glass-card">
      <form method="post" class="row g-4">
        {% csrf_token %}
        <div class="col-md-6">
          <label class="form-label text-muted">Username / Roll Number *</label>
          <input type="text" name="username" class="vvit-input" placeholder="e.g. 24BQ1A4942" required/>
        </div>
        <div class="col-md-6">
          <label class="form-label text-muted">Password (default: vvit@1234)</label>
          <input type="password" name="password" class="vvit-input" placeholder="Leave blank for default"/>
        </div>
        <div class="col-md-6">
          <label class="form-label text-muted">First Name *</label>
          <input type="text" name="first_name" class="vvit-input" required/>
        </div>
        <div class="col-md-6">
          <label class="form-label text-muted">Last Name</label>
          <input type="text" name="last_name" class="vvit-input"/>
        </div>
        <div class="col-md-6">
          <label class="form-label text-muted">Phone</label>
          <input type="tel" name="phone" class="vvit-input" placeholder="+91 XXXXXXXXXX"/>
        </div>
        <div class="col-md-6">
          <label class="form-label text-muted">Parent Name</label>
          <input type="text" name="parent_name" class="vvit-input" placeholder="e.g. Satyanarayana"/>
        </div>
        <div class="col-md-6">
          <label class="form-label text-muted">Parent Mobile</label>
          <input type="tel" name="parent_mobile" class="vvit-input" placeholder="+91 XXXXXXXXXX"/>
        </div>
        <div class="col-md-6">
          <label class="form-label text-muted">Admission Year</label>
          <input type="number" name="admission_year" class="vvit-input" value="2024"/>
        </div>
        <div class="col-md-4">
          <label class="form-label text-muted">Branch *</label>
          <select name="branch" class="vvit-select" required>
            <option value="">— Select —</option>
            {% for b in branches %}<option value="{{ b.id }}">{{ b.code }} — {{ b.name }}</option>{% endfor %}
          </select>
        </div>
        <div class="col-md-4">
          <label class="form-label text-muted">Year *</label>
          <select name="year" class="vvit-select" required>
            <option value="">— Select —</option>
            {% for y in years %}<option value="{{ y.id }}">{{ y }}</option>{% endfor %}
          </select>
        </div>
        <div class="col-md-4">
          <label class="form-label text-muted">Section *</label>
          <select name="section" class="vvit-select" required>
            <option value="">— Select —</option>
            {% for s in sections %}<option value="{{ s.id }}">{{ s }}</option>{% endfor %}
          </select>
        </div>
        <div class="col-md-6">
          <label class="form-label text-muted">Class Teacher</label>
          <select name="class_teacher" class="vvit-select">
            <option value="">— None —</option>
            {% for f in faculties %}<option value="{{ f.id }}">{{ f.employee_id }} — {{ f.user.get_full_name }}</option>{% endfor %}
          </select>
        </div>
        <div class="col-md-6">
          <label class="form-label text-muted">Counsellor</label>
          <select name="counsellor" class="vvit-select">
            <option value="">— None —</option>
            {% for f in faculties %}<option value="{{ f.id }}">{{ f.employee_id }} — {{ f.user.get_full_name }}</option>{% endfor %}
          </select>
        </div>
        <div class="col-12 d-flex gap-3">
          <button type="submit" class="btn-vvit-primary"><i class="fas fa-save me-2"></i>Create Student</button>
          <a href="{% url 'admin_dashboard:manage_students' %}" class="btn-vvit-outline">Cancel</a>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
